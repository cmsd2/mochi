[package]
name = "mochi"
version = "0.1.0"
description = "Read Modelica models into Maxima symbolic equations via rumoca"
license = "MIT"
entry = "mochi.mac"
doc = "doc/mochi.md"
repository = "https://github.com/cmsd2/mochi"
keywords = ["modelica", "control-systems", "state-space", "rumoca", "dae"]

[dependencies]
numerics = ">= 0.1.0"

[lisp]
quicklisp_systems = ["cl-json"]

[test]
# rtest_mochi.mac covers the core (mod_load + linear analysis +
# diagrams).  rtest_mochi_nonlinear.mac covers the opt-in
# mochi-nonlinear subsystem; it requires numerics-sundials installed.
# rtest_mochi_msl.mac covers MSL integration; it requires the Modelica
# Standard Library installed at one of the auto-discovery locations
# (see the file header).
files = [
    "rtest_mochi.mac",
    "rtest_mochi_nonlinear.mac",
    "rtest_mochi_msl.mac",
]
